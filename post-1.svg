<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Melodifestivalen themed - vibrant stage lights -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1b6d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffa500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffeb3b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#g1)"/>
  <circle cx="400" cy="300" r="80" fill="#ff6b9d" opacity="0.8"/>
  <circle cx="800" cy="500" r="120" fill="#ffd700" opacity="0.7"/>
  <polygon points="600,100 700,450 500,450" fill="#ff1b6d" opacity="0.6"/>
  <text x="600" y="700" font-size="60" font-weight="bold" text-anchor="middle" fill="white" opacity="0.9">Melodifestivalen</text>
</svg>