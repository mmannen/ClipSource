<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Zlatan Ibrahimović - sports/football theme -->
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f57c00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6f00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e65100;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#g4)"/>
  <!-- Football pitch -->
  <rect x="200" y="200" width="800" height="400" fill="#1b5e20" opacity="0.9"/>
  <line x1="600" y1="200" x2="600" y2="600" stroke="white" stroke-width="3"/>
  <circle cx="600" cy="400" r="40" fill="white" opacity="0.3"/>
  <!-- Ball -->
  <circle cx="500" cy="350" r="30" fill="#fff" opacity="0.95"/>
  <line x1="500" y1="320" x2="500" y2="380" stroke="#f57c00" stroke-width="2"/>
  <text x="600" y="730" font-size="48" font-weight="bold" text-anchor="middle" fill="white" opacity="0.95">Skavlan</text>
</svg>